aid: equipmentwatch
name: Equipmentwatch
description: >-
  EquipmentWatch provides construction and equipment data APIs that deliver
  rental rates, ownership costs, and specifications for construction equipment.
  Their data is used by contractors, equipment dealers, and insurance
  professionals to make informed decisions about equipment valuation and
  procurement.
